<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --accent: #22c55e; --x-color: #ef4444; --o-color: #3b82f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* NOVO PLACAR SEPARADO */
        .scoreboard { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 25px; 
            background: rgba(0,0,0,0.3); 
            padding: 15px 25px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
        }
        .score-item { flex: 1; display: flex; flex-direction: column; }
        .score-val { font-size: 2.2rem; font-weight: 700; line-height: 1; }
        .score-label { font-size: 0.65rem; font-weight: 700; margin-bottom: 5px; opacity: 0.8; }
        
        /* VS MENOR E DISCRETO */
        .vs-divider { 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: #475569; 
            padding: 0 15px;
            margin-top: 15px;
        }

        #lobby input { background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 12px; color: var(--accent); font-size: 2.5rem; width: 160px; text-align: center; padding: 10px; margin-bottom: 1.5rem; letter-spacing: 5px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; }
        #gameArea { display: none; flex-direction: column; align-items: center; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .cell { width: 90px; height: 90px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; cursor: pointer; }
        #status { font-weight: 700; margin: 15px 0; color: #f1c40f; min-height: 1.6rem; font-size: 1.1rem; }
        #resetBtn { background: transparent; border: 1px solid var(--border); margin-top: 20px; color: #94a3b8; width: auto; padding: 10px 30px; }
        .room-badge { background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="lobby">
            <h1>TIC-TAC-TOE</h1>
            <p style="color: #94a3b8; font-size: 0.8rem; letter-spacing: 1px;">DIGITE O PIN DA SALA</p>
            <input type="tel" id="roomInput" maxlength="4" placeholder="0000" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <button onclick="joinRoom()">ENTRAR NA ARENA</button>
        </div>

        <div id="gameArea">
            <div class="scoreboard">
                <div class="score-item" style="text-align: left;">
                    <span class="score-label" style="color: var(--x-color);">JOGADOR X</span>
                    <span class="score-val" id="scoreX" style="color: var(--x-color)">0</span>
                </div>
                
                <div class="vs-divider">VS</div>
                
                <div class="score-item" style="text-align: right;">
                    <span class="score-label" style="color: var(--o-color);">JOGADOR O</span>
                    <span class="score-val" id="scoreO" style="color: var(--o-color)">0</span>
                </div>
            </div>

            <div id="status">Conectando...</div>
            
            <div class="board">
                <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
            </div>
            
            <button id="resetBtn">LIMPAR TABULEIRO</button>
            <br>
            <div class="room-badge">SALA: <span id="roomDisplay" style="color: #22c55e"></span></div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
