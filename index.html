<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Multiplayer Rooms</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin-top: 20px; }
        #lobby { background: #2d2d2d; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-bottom: 20px; }
        input { padding: 10px; border-radius: 5px; border: none; margin-right: 10px; width: 150px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #28a745; color: white; font-weight: bold; }
        #gameArea { display: none; flex-direction: column; align-items: center; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #333; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; border-radius: 12px; }
        #status { font-size: 1.2rem; margin: 15px 0; color: #f1c40f; font-weight: bold; }
        #resetBtn { background: #e74c3c; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe Online</h1>

    <div id="lobby">
        <p>Digite o nome da sala para jogar com um amigo:</p>
        <input type="text" id="roomInput" placeholder="Ex: sala123">
        <button onclick="joinRoom()">Entrar na Sala</button>
    </div>

    <div id="gameArea">
        <div id="status">Conectando...</div>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button id="resetBtn">Zerar Partida</button>
        <p style="margin-top: 20px; color: #888;">Sala atual: <span id="roomDisplay"></span></p>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
