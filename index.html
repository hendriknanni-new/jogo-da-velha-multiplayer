<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Royale</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --accent: #22c55e; --x-color: #ef4444; --o-color: #3b82f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); padding: 2rem; border-radius: 24px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        
        .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; margin-bottom: 25px; background: rgba(0,0,0,0.3); padding: 15px 10px; border-radius: 20px; border: 1px solid var(--border); }
        .score-item { display: flex; flex-direction: column; align-items: center; }
        .score-val { font-size: 2.2rem; font-weight: 700; line-height: 1.1; }
        .score-label { font-size: 0.6rem; font-weight: 700; margin-bottom: 4px; opacity: 0.8; }
        .vs-divider { font-size: 0.7rem; font-weight: 700; color: #475569; padding: 0 10px; margin-top: 10px; }

        #lobby input { background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 12px; color: var(--accent); font-size: 2.5rem; width: 160px; text-align: center; padding: 10px; margin-bottom: 1.5rem; letter-spacing: 5px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; }
        
        #gameArea { display: none; flex-direction: column; align-items: center; }
        .board-container { position: relative; display: inline-block; }
        .board { display: grid; grid-template-columns: repeat(3, 90px); gap: 10px; }
        .cell { width: 90px; height: 90px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        
        /* LINHA DE VITÓRIA SVG */
        #winLineSvg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #winLine { stroke-width: 8; stroke-linecap: round; transition: all 0.5s ease; filter: drop-shadow(0 0 10px currentColor); }
        .line-x { stroke: var(--x-color); color: var(--x-color); }
        .line-o { stroke: var(--o-color); color: var(--o-color); }

        #status { font-weight: 700; margin: 15px 0; color: #f1c40f; min-height: 1.6rem; font-size: 1.1rem; }
        #resetBtn { background: transparent; border: 1px solid var(--border); margin-top: 20px; color: #94a3b8; width: auto; padding: 10px 30px; font-size: 0.8rem; }
        .room-badge { background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; color: #94a3b8; margin-top: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="container">
        <div id="lobby">
            <h1>TIC-TAC-TOE</h1>
            <input type="tel" id="roomInput" maxlength="4" placeholder="0000" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <button onclick="joinRoom()">ENTRAR NA ARENA</button>
        </div>

        <div id="gameArea">
            <div class="scoreboard">
                <div class="score-item"><span class="score-label" style="color: var(--x-color);">JOGADOR X</span><span class="score-val" id="scoreX" style="color: var(--x-color)">0</span></div>
                <div class="vs-divider">VS</div>
                <div class="score-item"><span class="score-label" style="color: var(--o-color);">JOGADOR O</span><span class="score-val" id="scoreO" style="color: var(--o-color)">0</span></div>
            </div>

            <div id="status">Conectando...</div>
            
            <div class="board-container">
                <div class="board" id="board">
                    <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                    <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                    <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
                </div>
                <svg id="winLineSvg"><line id="winLine" x1="0" y1="0" x2="0" y2="0" /></svg>
            </div>
            
            <button id="resetBtn">LIMPAR TABULEIRO</button>
            <div class="room-badge">SALA PIN: <span id="roomDisplay" style="color: #22c55e"></span></div>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
