<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Royale</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #22c55e;
            --x-color: #ef4444;
            --o-color: #3b82f6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Container Principal */
        .container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { font-weight: 700; letter-spacing: -1px; margin-bottom: 2rem; }

        /* Estilo do Lobby */
        #lobby input {
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--accent);
            font-size: 2.5rem;
            width: 180px;
            text-align: center;
            padding: 10px;
            margin-bottom: 1.5rem;
            letter-spacing: 10px;
            transition: 0.3s;
        }

        #lobby input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Área do Jogo */
        #gameArea { display: none; flex-direction: column; align-items: center; }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .cell {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .cell:hover { background: rgba(255, 255, 255, 0.08); transform: scale(1.02); }

        #status { font-weight: 700; margin-bottom: 1rem; min-height: 1.5rem; }

        .room-badge {
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        #resetBtn { background: transparent; border: 1px solid var(--border); margin-top: 15px; font-size: 0.8rem; }
        #resetBtn:hover { background: rgba(239, 68, 68, 0.1); border-color: var(--x-color); color: var(--x-color); }
    </style>
</head>
<body>

    <div class="container">
        <h1>TIC-TAC-TOE</h1>

        <div id="lobby">
            <p style="color: #94a3b8;">Digite o PIN de 4 dígitos</p>
            <input type="tel" id="roomInput" maxlength="4" placeholder="0000" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <button onclick="joinRoom()">Entrar na Arena</button>
        </div>

        <div id="gameArea">
            <div id="status">Conectando...</div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <button id="resetBtn">Zerar Partida</button>
            <div style="margin-top: 20px;">
                <span class="room-badge">SALA: <span id="roomDisplay"></span></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
