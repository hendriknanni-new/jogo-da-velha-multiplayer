<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha Multiplayer</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin-top: 40px; }
        #status { font-size: 1.4rem; margin-bottom: 20px; font-weight: bold; height: 35px; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; }
        .cell { width: 100px; height: 100px; background: #2d2d2d; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; border-radius: 12px; transition: 0.2s; }
        .cell:hover { background: #3d3d3d; border-color: #666; }
        #resetBtn { margin-top: 30px; padding: 12px 30px; cursor: pointer; border-radius: 8px; border: none; background: #e74c3c; color: white; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        #resetBtn:hover { background: #c0392b; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>Tic-Tac-Toe Online</h1>
    <div id="status">Conectando...</div>
    
    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button id="resetBtn">Zerar Jogo</button>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
